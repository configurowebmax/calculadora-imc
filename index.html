<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC Gratis | ConfiguroWeb</title>
    <meta name="description" content="Calcula tu indice de masa corporal (IMC) gratis. Descubre si tu peso es saludable segun tu estatura.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-emerald-600">Configuro<span class="text-slate-900">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-600 hover:text-emerald-600">← Volver a Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">Calculadora de IMC</h1>
            <p class="text-slate-500 text-sm">Calcula tu Índice de Masa Corporal y rango de peso saludable.</p>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Peso (kg)</label>
                    <input type="number" id="weight" value="70" min="20" max="300" step="0.1" class="w-full px-3 py-3 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">Estatura (cm)</label>
                    <input type="number" id="height" value="170" min="100" max="250" class="w-full px-3 py-3 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-emerald-500">
                </div>
            </div>
            <button onclick="calculate()" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl cursor-pointer">Calcular IMC</button>
        </div>

        <div id="results" class="hidden space-y-6">
            <div id="imcCard" class="p-8 rounded-2xl text-center text-white">
                <p class="text-sm uppercase tracking-wider opacity-80 mb-2">Tu IMC</p>
                <p id="imcValue" class="text-5xl font-extrabold mb-2">0.0</p>
                <p id="imcCategory" class="text-lg font-semibold">—</p>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-6">
                <p class="text-xs text-slate-500 uppercase mb-3">Escala de IMC</p>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between items-center"><span class="text-slate-700">Bajo peso</span><span class="text-slate-400">< 18.5</span></div>
                    <div class="flex justify-between items-center"><span class="text-slate-700">Normal</span><span class="text-slate-400">18.5 – 24.9</span></div>
                    <div class="flex justify-between items-center"><span class="text-slate-700">Sobrepeso</span><span class="text-slate-400">25 – 29.9</span></div>
                    <div class="flex justify-between items-center"><span class="text-slate-700">Obesidad</span><span class="text-slate-400">&ge; 30</span></div>
                </div>
                <hr class="my-4 border-slate-200">
                <p id="weightRange" class="text-sm text-slate-600 text-center"></p>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-400">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        function calculate() {
            const weight = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);
            if (!weight || !heightCm || heightCm < 50) return;
            
            const heightM = heightCm / 100;
            const imc = weight / (heightM * heightM);
            
            let cat, color;
            if (imc < 18.5) { cat = 'Bajo peso'; color = 'from-sky-500 to-blue-600'; }
            else if (imc < 25) { cat = 'Peso normal'; color = 'from-emerald-500 to-green-600'; }
            else if (imc < 30) { cat = 'Sobrepeso'; color = 'from-amber-500 to-orange-600'; }
            else { cat = 'Obesidad'; color = 'from-rose-500 to-red-600'; }

            document.getElementById('imcValue').innerText = imc.toFixed(1);
            document.getElementById('imcCategory').innerText = cat;
            document.getElementById('imcCard').className = `p-8 rounded-2xl text-center text-white bg-gradient-to-r ${color}`;

            const minW = (18.5 * heightM * heightM).toFixed(1);
            const maxW = (24.9 * heightM * heightM).toFixed(1);
            document.getElementById('weightRange').innerText = `Tu peso saludable está entre ${minW} kg y ${maxW} kg.`;

            document.getElementById('results').classList.remove('hidden');
        }
        document.addEventListener('DOMContentLoaded', calculate);
    </script>
</body>
</html>
